<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Cosmos</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body {
        height: 100%;
        height: 100dvh;
        background: #010108;
        overflow: hidden;
        cursor: crosshair;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
      }
      .hint {
        position: fixed;
        bottom: max(20px, env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        color: rgba(255,255,255,0.4);
        font: 500 11px/1.2 "Helvetica Neue", sans-serif;
        letter-spacing: 0.04em;
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <canvas id="cosmos"></canvas>
    <p class="hint" id="hint"></p>
    <script type="module" src="/cosmos.ts"></script>
  </body>
</html>
